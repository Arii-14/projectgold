<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Prediksi Harga Emas - LSTM Cepat</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
        background: linear-gradient(145deg, #0a1f2e 0%, #0c2a3b 100%);
        margin: 0;
        padding: 20px;
        color: #f0f3f8;
    }
    .container {
        max-width: 1000px;
        margin: 0 auto;
        background: rgba(10, 25, 35, 0.75);
        backdrop-filter: blur(2px);
        border-radius: 2rem;
        padding: 1.8rem;
        box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,215,0,0.3);
    }
    h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 5px;
        font-weight: 700;
        letter-spacing: 1px;
        background: linear-gradient(135deg, #FFD966, #FFB347);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    .subtitle {
        text-align: center;
        font-size: 0.75rem;
        color: #ffd966aa;
        margin-bottom: 20px;
    }
    .status-card {
        background: #071a24;
        padding: 14px 20px;
        border-radius: 40px;
        text-align: center;
        font-size: 0.85rem;
        margin-bottom: 28px;
        border-left: 5px solid #ffaa00;
        font-weight: 500;
        transition: all 0.3s ease;
    }
    .status-card.loading {
        border-left-color: #ffaa00;
    }
    .status-card.success {
        border-left-color: #00ff88;
    }
    .status-card.error {
        border-left-color: #ff4444;
    }
    .progress-wrapper {
        margin-bottom: 30px;
        margin-top: 5px;
        padding: 0 4px;
    }
    .progress-bar {
        width: 100%;
        height: 8px;
        background: #2a4a5a;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }
    .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #FFD966, #FFB347);
        border-radius: 4px;
        transition: width 0.3s ease;
    }
    .progress-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.7rem;
        color: #ffd966bb;
        margin-top: 6px;
        letter-spacing: 0.3px;
    }
    .input-panel {
        background: #0b2b38c9;
        border-radius: 1.5rem;
        padding: 1.8rem 1.2rem;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        border: 1px solid #ffd96655;
    }
    .input-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 100%;
        max-width: 280px;
    }
    .input-group label {
        font-size: 0.8rem;
        font-weight: bold;
        letter-spacing: 1px;
        color: #FFE6B3;
    }
    input, select {
        background: #0f2f3b;
        border: 1px solid #ffc857;
        padding: 12px 16px;
        border-radius: 40px;
        color: white;
        font-size: 1rem;
        outline: none;
        text-align: center;
        width: 100%;
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23FFD966' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
        background-repeat: no-repeat;
        background-position: right 1.2rem center;
        background-size: 1.2rem;
        padding-right: 2.8rem;
    }
    input:focus, select:focus {
        border-color: gold;
        box-shadow: 0 0 6px rgba(255,215,0,0.6);
        background: #1a3f4b;
    }
    input::placeholder {
        color: #bbaa77;
        font-size: 0.85rem;
    }
    select option {
        background: #0f2f3b;
        color: #f0f3f8;
    }
    .button-container {
        display: flex;
        justify-content: center;
        margin: 20px 0;
    }
    button {
        background: radial-gradient(circle at 30% 10%, #f0b429, #d48f1f);
        border: none;
        color: #1e2f3a;
        font-weight: bold;
        padding: 14px 40px;
        border-radius: 50px;
        font-size: 1.1rem;
        cursor: pointer;
        box-shadow: 0 4px 0 #7a4a0e;
        transform: translateY(-2px);
        min-width: 250px;
        transition: all 0.1s ease;
    }
    button:active {
        transform: translateY(2px);
        box-shadow: 0 1px 0 #7a4a0e;
    }
    button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    .result {
        background: #06212bcc;
        border-radius: 1.5rem;
        padding: 1.5rem;
        margin-top: 20px;
        transition: all 0.3s ease;
    }
    .result h3 {
        margin-top: 0;
        color: #FFD966;
        border-left: 3px solid gold;
        padding-left: 12px;
    }
    .prediction-table {
        width: 100%;
        border-collapse: collapse;
        margin: 15px 0;
    }
    .prediction-table th, .prediction-table td {
        padding: 12px 10px;
        border-bottom: 1px solid #ffd96644;
        text-align: left;
    }
    .prediction-table th {
        background: #d4a01733;
        font-weight: bold;
        color: #FFE6B3;
    }
    .highlight-price {
        font-size: 1.5rem;
        font-weight: bold;
        color: #FFD966;
    }
    .note {
        font-size: 0.7rem;
        text-align: center;
        margin-top: 15px;
        color: #ffd966aa;
        background: #071a2488;
        padding: 8px;
        border-radius: 12px;
    }
    .loading-spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #ffd96633;
        border-top-color: #FFD966;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @media (max-width: 600px) {
        .highlight-price { font-size: 1.1rem; }
        .prediction-table th, .prediction-table td { padding: 8px 6px; }
        .input-group { max-width: 90%; }
        input, select { padding: 10px 12px; font-size: 0.9rem; }
        button { padding: 12px 25px; min-width: 200px; font-size: 1rem; }
        .status-card { padding: 12px 16px; font-size: 0.75rem; margin-bottom: 22px; }
        .progress-wrapper { margin-bottom: 24px; }
    }
    .architecture {
        background: #0a1a22;
        border-radius: 12px;
        padding: 10px;
        margin-top: 15px;
        text-align: center;
        font-size: 0.7rem;
        color: #ffd966bb;
    }
    footer {
        text-align: center;
        font-size: 0.65rem;
        margin-top: 20px;
        color: #ffd96677;
    }
    .info-badge {
        background: #1a4a5a;
        border-radius: 20px;
        padding: 8px 15px;
        font-size: 0.75rem;
        text-align: center;
        margin-top: 10px;
        display: inline-block;
        width: auto;
    }
    .validation-message {
        font-size: 0.7rem;
        color: #ffaa66;
        text-align: center;
        margin-top: 8px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>PREDIKSI HARGA EMAS</h2>
    <div class="subtitle">Long Short-Term Memory (LSTM) - Fast Predictions</div>
    
    <div class="status-card loading" id="status">
        <span class="loading-spinner"></span> Memuat data...
    </div>
    
    <div class="progress-wrapper" id="progressWrapper" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label">
            <span>⚡ Melatih LSTM (Optimized)</span>
            <span id="progressPercent">0%</span>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-group">
            <label>📅 TANGGAL</label>
            <input type="number" id="tanggal" placeholder="DD" min="1" max="31" value="">
        </div>
        <div class="input-group">
            <label>📅 BULAN</label>
            <input type="number" id="bulan" placeholder="MM" min="1" max="12" value="">
        </div>
        <div class="input-group">
            <label>📅 TAHUN</label>
            <input type="number" id="tahun" placeholder="YYYY" value="">
        </div>
        
        <div class="input-group">
            <label>KARAT</label>
            <select id="karatSelect">
                <option value="" disabled selected hidden>Pilih Karat</option>
                <option value="24">24 Karat (Emas Murni)</option>
                <option value="22">22 Karat</option>
                <option value="18">18 Karat</option>
                <option value="14">14 Karat</option>
                <option value="10">10 Karat</option>
            </select>
        </div>
        <div id="inputValidationMsg" class="validation-message"></div>
    </div>

    <div class="button-container">
        <button onclick="predictWithLSTM()" id="predictBtn" disabled>PREDIKSI DENGAN LSTM</button>
    </div>

    <div id="output" class="result"></div>
    
    <div class="architecture">
        ✨ Prediksi untuk tanggal APAPUN (masa lalu, sekarang, masa depan)
    </div>
</div>

<script>
    // ===================================
    // VARIABEL PENDUKUNG PROGRAM LSTM
    // ===================================
    let model = null; // Menyimpan model LSTM 
    const kursRupiah = 18000; // Kurs Rupiah ke USD
    let modelReady = false; // Status model selesai training atau belum
    let historicalData = { prices: [] }; // Menyimpan data historis harga emas
    const gramPerOz = 31.1034768; // konversi gram ke troy ounce.
    
    let normParams = {
        min: [Infinity, Infinity, Infinity, Infinity, Infinity],
        max: [-Infinity, -Infinity, -Infinity, -Infinity, -Infinity]
    };
    const SEQUENCE_LEN = 10;
    
    // Elemen input
    const tanggalInput = document.getElementById('tanggal');
    const bulanInput = document.getElementById('bulan');
    const tahunInput = document.getElementById('tahun');
    const karatSelect = document.getElementById('karatSelect');
    const predictBtn = document.getElementById('predictBtn');
    const validationMsgDiv = document.getElementById('inputValidationMsg');
    
    function validateInputsAndEnableButton() {
        if (!modelReady) {
            predictBtn.disabled = true;
            validationMsgDiv.innerText = '';
            return false;
        }
        
        const tanggal = tanggalInput.value.trim();
        const bulan = bulanInput.value.trim();
        const tahun = tahunInput.value.trim();
        const karat = karatSelect.value;
        
        let isValid = true;
        let msg = '';
        
        if (!tanggal) {
            isValid = false;
            msg = '❌ Tanggal harus diisi';
        } else if (!bulan) {
            isValid = false;
            msg = '❌ Bulan harus diisi';
        } else if (!tahun) {
            isValid = false;
            msg = '❌ Tahun harus diisi';
        } else if (!karat) {
            isValid = false;
            msg = '❌ Silakan pilih karat';
        } else {
            const tgl = parseInt(tanggal);
            const bln = parseInt(bulan);
            const thn = parseInt(tahun);
            
            if (isNaN(tgl) || isNaN(bln) || isNaN(thn)) {
                isValid = false;
                msg = '❌ Input tanggal/bulan/tahun tidak valid';
            } else if (bln < 1 || bln > 12) { // VALIDASI BULAN
                isValid = false;
                msg = '❌ Bulan harus antara 1 - 12';
            } else {
                // Validasi tanggal (hari dalam bulan)
                const maxDay = new Date(thn, bln, 0).getDate();
                if (tgl < 1 || tgl > maxDay) {
                    isValid = false;
                    msg = `❌ Tanggal ${tgl} tidak valid untuk bulan ${bln}/${thn}`;
                }
            }
        }
        
        if (isValid && modelReady) {
            predictBtn.disabled = false;
            validationMsgDiv.innerText = '✅ Semua input valid, siap prediksi!';
            validationMsgDiv.style.color = '#aaffaa';
        } else {
            predictBtn.disabled = true;
            if (msg) {
                validationMsgDiv.innerText = msg;
                validationMsgDiv.style.color = '#ffaa66';
            } else if (!modelReady) {
                validationMsgDiv.innerText = '⏳ Model sedang memuat, tunggu sebentar...';
                validationMsgDiv.style.color = '#ffd966';
            } else {
                validationMsgDiv.innerText = '⚠️ Lengkapi semua data untuk memprediksi';
                validationMsgDiv.style.color = '#ffaa66';
            }
        }
        
        return isValid && modelReady;
    }
    
    function bindInputEvents() {
        tanggalInput.addEventListener('input', validateInputsAndEnableButton);
        bulanInput.addEventListener('input', validateInputsAndEnableButton);
        tahunInput.addEventListener('input', validateInputsAndEnableButton);
        karatSelect.addEventListener('change', validateInputsAndEnableButton);
    }
    
    // ===================================
    // 1. MEMBACA DATA CSV HISTORIS HARGA EMAS
    // ===================================
    async function loadCSVData() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '<span class="loading-spinner"></span> Membaca file CSV...';
        
        try {
            // ==================================
            // DATA CSV
            // ==================================
            const response = await fetch('Data-harga.csv'); // Mengambil file CSV
            if (!response.ok) throw new Error(`File CSV tidak ditemukan`); // Jika file tidak ditemukan
            
            const csvText = await response.text(); 
            const lines = csvText.trim().split('\n'); 
            const prices = [];
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let delimiter = line.includes(';') ? ';' : ',';
                let cols = line.split(delimiter);
                let rawDate = cols[0].trim().replace(/["']/g, '');
                
                let day, month, year;
                let validDate = false;

                if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
                    let parts = rawDate.split('-');
                    year = parseInt(parts[0]);
                    month = parseInt(parts[1]);
                    day = parseInt(parts[2]);
                    validDate = true;
                }
                else if (/^\d{2}\/\d{2}\/\d{4}$/.test(rawDate)) {
                    let parts = rawDate.split('/');
                    day = parseInt(parts[0]);
                    month = parseInt(parts[1]);
                    year = parseInt(parts[2]);
                    validDate = true;
                }
                // Format tanggal YYYYMMDD
                else if (/^\d{8}$/.test(rawDate)) {
                    year = parseInt(rawDate.substring(0,4));
                    month = parseInt(rawDate.substring(4,6));
                    day = parseInt(rawDate.substring(6,8));
                    validDate = true;
                }
                
                if (!validDate) continue;
                
                // Validasi bulan saat loading data
                if (month < 1 || month > 12) continue;
                
                let parsedDate = `${day.toString().padStart(2,'0')}/${month.toString().padStart(2,'0')}/${year}`;
                let priceValues = [];

                for (let j = 1; j <= 5; j++) {
                    let val = cols[j] ? cols[j].trim() : "0";
                    val = val.replace(/\./g, '').replace(',', '.');
                    let num = parseFloat(val);
                    priceValues.push(isNaN(num) ? 0 : num);
                }
                
                if (priceValues.every(p => p === 0)) continue;

                // Menyimpan data
                prices.push({
                    date: parsedDate,
                    prices: priceValues,
                    timestamp: new Date(year, month-1, day).getTime()
                });
            }
            prices.sort((a, b) => a.timestamp - b.timestamp); // Mengurutkan data berdasarkan waktu
            historicalData.prices = prices; // Menyimpan data historis
            
            if (prices.length === 0) {
                throw new Error("Tidak ada data valid dalam CSV");
            }

            // Menampilkan jumlah data
            statusDiv.innerHTML = `✅ Data loaded: ${prices.length} entries (${prices[0].date} - ${prices[prices.length-1].date})`;
            statusDiv.className = 'status-card success';
            
            // Menyesuaikan normalisasi
            adjustNormParams();

            return true;
            
        } catch (err) {
            statusDiv.innerHTML = `❌ Gagal: ${err.message}`;
            statusDiv.className = 'status-card error';
            return false;
        }
    }
    // ==========================================
    // 2. NORMALISASI DATA
    // ==========================================
    function adjustNormParams() {
        if (historicalData.prices.length === 0) return;
        
        // Mencari nilai minimum dan maksimum   
        for (let i = 0; i < 5; i++) {
            normParams.min[i] = Infinity;
            normParams.max[i] = -Infinity;
        }
        
        for (const entry of historicalData.prices) {
            for (let i = 0; i < 5; i++) {
                if (entry.prices[i] < normParams.min[i]) normParams.min[i] = entry.prices[i];
                if (entry.prices[i] > normParams.max[i]) normParams.max[i] = entry.prices[i];
            }
        }
        
        for (let i = 0; i < 5; i++) {
            const margin = (normParams.max[i] - normParams.min[i]) * 0.05;
            normParams.min[i] = Math.max(0, normParams.min[i] - margin);
            normParams.max[i] = normParams.max[i] + margin;
        }
    }
    
    // Mengubah data ke rentang 0 - 1
    function normalizeData(data) {
        return data.map((val, i) => {
            const range = normParams.max[i] - normParams.min[i];
            if (range === 0 || isNaN(range)) return 0.5;
            return (val - normParams.min[i]) / range;
        });
    }
  
    function denormalizePrice(normVal) {
        const range = normParams.max[0] - normParams.min[0];
        return normVal * range + normParams.min[0];
    }
    // ===============================
    // 3. MEMBUAT SEQUENCE TIME SERIES
    // ===============================

    // Menggunakan SEQUENCE_LEN = 10
    // Input : 10 hari sebelumnya × 5 fitur karat
    // Target: Harga 24K pada hari berikutnya
    function createSequences() {
        const sequences = [];
        const targets = [];
        
        // Data dinormalisasi
        const normalizedData = historicalData.prices.map(p => normalizeData(p.prices));
        
        for (let i = SEQUENCE_LEN; i < normalizedData.length; i++) {
            sequences.push(normalizedData.slice(i - SEQUENCE_LEN, i));
            targets.push([normalizedData[i][0]]); // Target prediksi
        }
        
        return { sequences, targets };
    }
    
    function getLatestSequence() {
        if (historicalData.prices.length < SEQUENCE_LEN) return null;
        
        const sequence = [];
        const startIdx = historicalData.prices.length - SEQUENCE_LEN;
        for (let i = startIdx; i < historicalData.prices.length; i++) {
            sequence.push(normalizeData(historicalData.prices[i].prices));
        }
        return sequence;
    }
    
    function getSequenceByIndex(targetIndex) {
        if (targetIndex < SEQUENCE_LEN || targetIndex > historicalData.prices.length) return null;
        
        const sequence = [];
        for (let i = targetIndex - SEQUENCE_LEN; i < targetIndex; i++) {
            sequence.push(normalizeData(historicalData.prices[i].prices));
        }
        return sequence;
    }
    
    // ================================================
    // 4. MELATIH MODEL ANN MENGGUNAKAN ALGORITMA LSTM
    // ================================================
    async function buildLSTMModel() {
        const statusDiv = document.getElementById('status');
        
        if (historicalData.prices.length < SEQUENCE_LEN + 5) {
            throw new Error(`Data tidak cukup (minimal ${SEQUENCE_LEN + 5} baris)`);
        }
        
        const { sequences, targets } = createSequences();
        
        if (sequences.length === 0) {
            throw new Error("Tidak dapat membuat sequence data");
        }
        
        statusDiv.innerHTML = '<span class="loading-spinner"></span> Membangun model LSTM ringan...';
        
        model = tf.sequential();
        
        // Layer LSTM
        model.add(tf.layers.lstm({
            units: 32, // Jumlah neuron
            returnSequences: false, // Output sequence terakhir
            inputShape: [SEQUENCE_LEN, 5] // Bentuk input
        }));

        model.add(tf.layers.dropout({ rate: 0.2 }));
        
        // ===========================
        // MODEL ANN
        // ===========================

        // Hidden layer ANN
        model.add(tf.layers.dense({ units: 8, activation: 'relu' }));
        model.add(tf.layers.dense({ units: 1 })); // Output layer ANN
        
        model.compile({
            optimizer: tf.train.adam(0.002),
            loss: 'meanSquaredError'
        });
        // Mengubah data menjadi tensor
        const xs = tf.tensor3d(sequences);
        const ys = tf.tensor2d(targets);
        
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressPercentSpan = document.getElementById('progressPercent');
        progressWrapper.style.display = 'block';
        
        // Kurangi epochs untuk training lebih cepat 
        const epochs = 30;
        const batchSize = Math.min(32, Math.floor(sequences.length / 4) || 8);
        
        statusDiv.innerHTML = `<span class="loading-spinner"></span> Training LSTM (${epochs} epochs)...`;
        // ==================================
        // 5. MEMPELAJARI POLA HARGA EMAS
        // ==================================
        await model.fit(xs, ys, {
            epochs: epochs,
            batchSize: batchSize,
            verbose: false,
            callbacks: {
                onEpochEnd: (epoch, logs) => {
                    const progress = ((epoch + 1) / epochs) * 100;
                    progressFill.style.width = `${progress}%`;
                    progressPercentSpan.innerText = `${Math.round(progress)}%`;
                    if (epoch % 5 === 0 || epoch === epochs - 1) {
                        statusDiv.innerHTML = `<span class="loading-spinner"></span> Training: ${epoch + 1}/${epochs} (Loss: ${logs.loss.toFixed(5)})`;
                    }
                }
            }
        });
        
        xs.dispose();
        ys.dispose();
        modelReady = true;
        
        progressWrapper.style.display = 'none';
        statusDiv.innerHTML = `✅ Model siap!`;
        statusDiv.className = 'status-card success';
        
        // Setelah model siap, cek kembali validasi input untuk mengaktifkan tombol
        validateInputsAndEnableButton();
    }
    
    function extrapolatePrice(targetTimestamp) {
        if (historicalData.prices.length === 0) return null;
        
        const lastEntry = historicalData.prices[historicalData.prices.length - 1];
        const daysDiff = (targetTimestamp - lastEntry.timestamp) / (1000 * 3600 * 24);
        
        if (Math.abs(daysDiff) > 365) return null;
        
        if (historicalData.prices.length >= 2) {
            const prevEntry = historicalData.prices[historicalData.prices.length - 2];
            const dailyChange = (lastEntry.prices[0] - prevEntry.prices[0]) / 
                ((lastEntry.timestamp - prevEntry.timestamp) / (1000 * 3600 * 24));
            const extrapolated = lastEntry.prices[0] + dailyChange * daysDiff;
            return Math.max(0, extrapolated);
        }
        
        return lastEntry.prices[0];
    }
    // ==================================
    // 6. MELAKUKAN PREDIKSI HARGA EMAS
    // ==================================
    async function predictWithLSTM() {
        if (!modelReady || !model) {
            alert("Model sedang dipersiapkan, tunggu sebentar...");
            return;
        }
        
        // Validasi ulang sebelum prediksi (double-check)
        if (!validateInputsAndEnableButton()) {
            alert("Harap lengkapi semua input dengan benar terlebih dahulu.");
            return;
        }
        
        const tanggal = parseInt(tanggalInput.value);
        const bulan = parseInt(bulanInput.value);
        const tahun = parseInt(tahunInput.value);
        const selectedKarat = parseInt(karatSelect.value);
        
        // VALIDASI BULAN SEBELUM PREDIKSI
        if (bulan < 1 || bulan > 12) {
            alert(`Bulan ${bulan} tidak valid. Bulan harus antara 1 - 12`);
            return;
        }
        
        const maxDay = new Date(tahun, bulan, 0).getDate();
        if (tanggal < 1 || tanggal > maxDay) {
            alert(`Tanggal ${tanggal} tidak valid untuk bulan ${bulan}/${tahun}`);
            return;
        }
        
        const targetDate = new Date(tahun, bulan-1, tanggal);
        const targetDateStr = `${tanggal.toString().padStart(2, '0')}/${bulan.toString().padStart(2, '0')}/${tahun}`;
        const targetTimestamp = targetDate.getTime();
        
        let targetEntry = null;
        for (let i = 0; i < historicalData.prices.length; i++) {
            if (historicalData.prices[i].date === targetDateStr) {
                targetEntry = { data: historicalData.prices[i], index: i };
                break;
            }
        }
        
        let predictedPrice24K = null;
        let predictionMethod = "";
        
        if (targetEntry) {
            const sequence = getSequenceByIndex(targetEntry.index);
            if (sequence && sequence.length === SEQUENCE_LEN) {
                const inputTensor = tf.tensor3d([sequence]);
                const prediction = model.predict(inputTensor);
                predictedPrice24K = denormalizePrice(prediction.dataSync()[0]);
                inputTensor.dispose();
                prediction.dispose();
                predictionMethod = "LSTM Prediction";
            } else {
                predictedPrice24K = targetEntry.data.prices[0];
                predictionMethod = "Actual Data (no history)";
            }
        } else {
            // Prediksi untuk tanggal di luar dataset
            const lastDate = historicalData.prices[historicalData.prices.length - 1];
            const daysDiff = Math.round((targetTimestamp - lastDate.timestamp) / (1000 * 3600 * 24));
            
            if (Math.abs(daysDiff) <= 30) {
                const sequence = getLatestSequence();
                if (sequence && sequence.length === SEQUENCE_LEN) {
                    const inputTensor = tf.tensor3d([sequence]);
                    const prediction = model.predict(inputTensor);
                    let lastPrediction = denormalizePrice(prediction.dataSync()[0]);
                    inputTensor.dispose();
                    prediction.dispose();
                    
                    if (daysDiff > 0) {
                        predictedPrice24K = lastPrediction * (1 + (daysDiff * 0.001));
                    } else if (daysDiff < 0) {
                        predictedPrice24K = lastPrediction * (1 + (daysDiff * 0.001));
                    } else {
                        predictedPrice24K = lastPrediction;
                    }
                    predictionMethod = `LSTM Extrapolation (${Math.abs(daysDiff)} days ${daysDiff > 0 ? 'ahead' : 'before'})`;
                } else {
                    predictedPrice24K = extrapolatePrice(targetTimestamp);
                    predictionMethod = "Trend Extrapolation";
                }
            } else {
                predictedPrice24K = extrapolatePrice(targetTimestamp);
                predictionMethod = `Trend Extrapolation (${Math.abs(daysDiff)} days)`;
            }
            
            if (!predictedPrice24K || predictedPrice24K <= 0) {
                predictedPrice24K = historicalData.prices[historicalData.prices.length - 1].prices[0];
                predictionMethod = "Latest Price (fallback)";
            }
        }
        
        const actualPrice24K = targetEntry ? targetEntry.data.prices[0] : null;
        const hargaPerKaratPredicted = predictedPrice24K * (selectedKarat / 24);
        
        const usdPerGramPredicted = hargaPerKaratPredicted / kursRupiah;
        const usdPerOuncePredicted = usdPerGramPredicted * gramPerOz;
        
        let outputHTML = `
            <h3>📊 HASIL PREDIKSI</h3>
            <table class="prediction-table">
                <tr><th colspan="2">📋 PARAMETER INPUT</th></tr>
                <tr><td style="width:40%">Tanggal</td><td><strong>${targetDateStr}</strong> ${!targetEntry ? '<span style="color:#FFD966;"> ✨ (Di luar dataset)</span>' : ''}</td></tr>
                <tr><td>Karat</td><td><strong>${selectedKarat} Karat</strong></td></tr>
                <tr><td>Metode</td><td><span style="color:#FFD966;">${predictionMethod}</span></td></tr>
            </table>
            
            <h3>💰 HARGA ${selectedKarat} KARAT</h3>
            <table class="prediction-table">
                <tr><th colspan="2">HASIL PREDIKSI</th></tr>
                <tr><td>Rupiah per gram (Rp/gr)</td><td class="highlight-price">Rp ${Math.round(hargaPerKaratPredicted).toLocaleString('id-ID')}</td></tr>
                <tr><td>USD per Troy Ounce (USD/oz)</td><td>$${usdPerOuncePredicted.toFixed(2)}</td></tr>
            </table>
        `;
        
        if (actualPrice24K !== null) {
            const hargaPerKaratActual = actualPrice24K * (selectedKarat / 24);
            const errorPercent = Math.abs((predictedPrice24K - actualPrice24K) / actualPrice24K * 100);
            outputHTML += `
                <div class="note">
                    📊 Data aktual: Rp ${Math.round(hargaPerKaratActual).toLocaleString('id-ID')}/gr (Error: ${errorPercent.toFixed(1)}%)
                </div>
            `;
        } else {
            outputHTML += `
                <div class="note">
                    🔮 Prediksi untuk tanggal di luar dataset (${targetDateStr})
                </div>
            `;
        }
        // ========================================================
        // 7. MENAMPILKAN HASIL PREDIKSI SESUAI KARAT YANG DIPILIH
        // ========================================================
        document.getElementById('output').innerHTML = outputHTML;
    }
     
    async function init() {
        bindInputEvents(); 
        const success = await loadCSVData();
        if (!success) {
            document.getElementById('predictBtn').disabled = true;
            validationMsgDiv.innerText = '❌ Gagal memuat data, periksa file CSV';
            return;
        }
        
        await buildLSTMModel();
    }
    
    init();
</script>
</body>
</html>
